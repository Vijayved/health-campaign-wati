<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Campaign Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #075e54, #128c7e);
            color: white;
            padding: 20px 30px;
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .stat-card h3 { font-size: 14px; color: #666; margin-bottom: 10px; }
        .stat-card .value { font-size: 36px; font-weight: bold; color: #075e54; }
        .section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .section h2 { margin-bottom: 20px; font-size: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-assigned { background: #fff3e0; color: #ed6c02; }
        .status-converted { background: #e8f5e9; color: #2e7d32; }
        .status-waiting { background: #fff3e0; color: #f57c00; }
        .status-not_converted { background: #ffebee; color: #c62828; }
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        select, input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            background: #075e54;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .refresh-btn { background: #25d366; margin-left: auto; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            th, td { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏥 Health Campaign Dashboard</h1>
            <p>Real-time lead tracking • Round Robin Assignment</p>
        </div>
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card"><h3>Total Leads</h3><div class="value" id="totalLeads">-</div></div>
            <div class="stat-card"><h3>Today's Leads</h3><div class="value" id="todayLeads">-</div></div>
            <div class="stat-card"><h3>Converted</h3><div class="value" id="converted">-</div></div>
            <div class="stat-card"><h3>Waiting</h3><div class="value" id="waiting">-</div></div>
            <div class="stat-card"><h3>Not Converted</h3><div class="value" id="notConverted">-</div></div>
            <div class="stat-card"><h3>Assigned</h3><div class="value" id="assigned">-</div></div>
        </div>
        <div class="section">
            <h2>👥 Executive Performance</h2>
            <table id="executiveTable">
                <thead><tr><th>Executive</th><th>Phone</th><th>Total Leads</th><th>Converted</th><th>Rate</th> </tr</thead>
                <tbody></tbody>
             </table>
        </div>
        <div class="section">
            <h2>📋 Recent Leads</h2>
            <div class="filter-bar">
                <select id="statusFilter"><option value="">All</option><option value="assigned">Assigned</option><option value="converted">Converted</option><option value="waiting">Waiting</option><option value="not_converted">Not Converted</option></select>
                <select id="executiveFilter"><option value="">All Executives</option><option value="Aditi">Aditi</option><option value="Khyati">Khyati</option><option value="Jay">Jay</option><option value="Mital">Mital</option></select>
                <button onclick="loadLeads()">Apply</button>
                <button class="refresh-btn" onclick="loadAllData()">🔄 Refresh</button>
            </div>
            <div style="overflow-x:auto;"><table id="leadsTable"><thead><tr><th>Phone</th><th>Executive</th><th>Test Type</th><th>Status</th><th>Created</th><th>Action</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
    <script>
        const API_BASE = window.location.origin;
        async function loadStats() {
            const res = await fetch(`${API_BASE}/api/stats`);
            const data = await res.json();
            if(data.success){
                document.getElementById('totalLeads').textContent = data.stats.totalLeads;
                document.getElementById('todayLeads').textContent = data.stats.todayLeads;
                document.getElementById('converted').textContent = data.stats.converted;
                document.getElementById('waiting').textContent = data.stats.waiting;
                document.getElementById('notConverted').textContent = data.stats.notConverted;
                document.getElementById('assigned').textContent = data.stats.assigned;
                const tbody = document.querySelector('#executiveTable tbody');
                tbody.innerHTML = '';
                data.executiveStats.forEach(e => { tbody.innerHTML += `<tr><td><strong>${e.name}</strong></td><td>${e.phone}</td><td>${e.totalLeads}</td><td>${e.converted}</td><td>${e.conversionRate}%</td></tr>`; });
            }
        }
        async function loadLeads() {
            let url = `${API_BASE}/api/leads?limit=100`;
            if(document.getElementById('statusFilter').value) url += `&status=${document.getElementById('statusFilter').value}`;
            if(document.getElementById('executiveFilter').value) url += `&executive=${document.getElementById('executiveFilter').value}`;
            const res = await fetch(url);
            const data = await res.json();
            if(data.success){
                const tbody = document.querySelector('#leadsTable tbody');
                tbody.innerHTML = '';
                data.data.forEach(l => {
                    tbody.innerHTML += `<tr><td>${l.phoneNumber}</td><td>${l.executiveAssigned || '-'}</td><td>${l.testType || '-'}</td><td><span class="status-badge status-${l.status}">${l.status}</span></td><td>${new Date(l.createdAt).toLocaleString()}</td><td><select onchange="updateStatus('${l._id}',this.value)"><option ${l.status==='assigned'?'selected':''} value="assigned">Assigned</option><option ${l.status==='converted'?'selected':''} value="converted">Converted</option><option ${l.status==='waiting'?'selected':''} value="waiting">Waiting</option><option ${l.status==='not_converted'?'selected':''} value="not_converted">Not Converted</option></select></td></tr>`;
                });
            }
        }
        async function updateStatus(id,status){
            await fetch(`${API_BASE}/api/leads/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
            loadAllData();
        }
        async function loadAllData(){ await loadStats(); await loadLeads(); }
        loadAllData();
        setInterval(loadAllData, 30000);
    </script>
</body>
</html>
