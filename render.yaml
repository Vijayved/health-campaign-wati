services:
  - type: web
    name: health-campaign-wati
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: WATI_API_URL
        value: https://live-mt-server.wati.io
      - key: WATI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: LEAD_TEMPLATE_NAME
        value: health_checkup_welcome
      - key: EXECUTIVE_TEMPLATE_NAME
        value: executive_lead_notification
      - key: MAMMOGRAPHY_LINK
        value: https://www.nibib.nih.gov/sites/default/files/2022-05/Fact-Sheet-Mammography.pdf
      - key: DEXA_LINK
        value: https://www.youtube.com/watch?v=HkLuviUi8Mc
      - key: BLOOD_PACKAGE_LINK
        value: https://www.airmedlabs.com/
      - key: BOOKING_LINK
        value: https://wa.me/919876543210?text=I%20want%20to%20book%20a%20test
